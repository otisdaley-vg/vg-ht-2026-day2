services:
  app:
    image: ghcr.io/otisdaley-vg/hackathon-daytwo:latest
    volumes:
      - ../:/workspaces/daytwo:cached
    command: sleep infinity
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://hackathon:hackathon@db:5432/movies

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: movies
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

volumes:
  postgres-data:
